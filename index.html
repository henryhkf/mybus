<!DOCTYPE html>
<html lang="zh-Hant-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>九巴實時到站牌（多坑位精準版）</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f2f4f6; padding: 15px; margin: 0; }
        .container { max-width: 500px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; background-color: #bd1a1a; color: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .header h1 { margin: 0; font-size: 1.2rem; }
        .refresh-btn { background-color: white; color: #bd1a1a; border: none; padding: 8px 14px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .station-card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 6px rgba(0,0,0,0.06); }
        .station-name { font-size: 1.05rem; font-weight: bold; color: #bd1a1a; border-bottom: 2px solid #f0f0f0; padding-bottom: 8px; margin-bottom: 12px; }
        .eta-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px dashed #f0f0f0; }
        .eta-row:last-child { border-bottom: none; }
        .route-badge { background-color: #f8f9fa; padding: 5px 8px; border-radius: 6px; font-weight: 800; color: #222; min-width: 55px; text-align: center; border: 1px solid #e1e4e6; font-size: 1.1rem; }
        .route-dest { flex-grow: 1; margin-left: 15px; font-size: 0.95rem; color: #444; }
        .eta-box { text-align: right; min-width: 90px; }
        .eta-time { color: #2ecc71; font-weight: bold; font-size: 1.1rem; display: block; }
        .eta-next { color: #888; font-size: 0.8rem; margin-top: 2px; display: block; }
        .no-bus { color: #7f8c8d; font-weight: normal; font-size: 0.95rem; }
        .update-time { text-align: center; font-size: 0.8rem; color: #95a5a6; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🚍 實時巴士到站牌</h1>
        <button class="refresh-btn" onclick="initUpdate()">手動更新</button>
    </div>

    <div class="station-card">
        <div class="station-name">📍 協和街 - 祥和苑（南行站）</div>
        <div id="board-cheung-wo"><p style="text-align:center; color:#7f8c8d;">正在同步九巴數據...</p></div>
    </div>
    
    <div class="station-card">
        <div class="station-name">📍 觀塘道 - 觀塘市中心（往油塘方向）</div>
        <div id="board-kwun-tong"><p style="text-align:center; color:#7f8c8d;">正在同步九巴數據...</p></div>
    </div>
    
    <div class="update-time" id="last-update"></div>
</div>

<script>
// 精準將路線與其各自在官方數據庫對應的 Stop ID 綁定
const STATIONS = {
    "board-cheung-wo": [
        { route: "1A",  id: "HI04-S-1100-0", dest: "尖沙咀碼頭" },
        { route: "11C", id: "HI04-S-1000-0", dest: "竹園邨" },
        { route: "601", id: "HI04-S-1100-0", dest: "金鐘(東)" },
        { route: "11X", id: "HI04-S-1000-0", dest: "紅磡站" },
        { route: "13D", id: "HI04-S-1100-0", dest: "維港灣" }
    ],
    "board-kwun-tong": [
        { route: "14",  id: "CH19-S-1200-0", dest: "鯉魚門邨" },
        { route: "14X", id: "CH19-S-1200-0", dest: "鯉魚門(崇信街)" },
        { route: "X42C",id: "CH19-S-1200-0", dest: "油塘" }
    ]
};

// 用來儲存 API 回傳結果的暫存器，避免重覆發送同一個站點的網絡請求
let stopCache = {};

async function processBoard(boardId, routeList) {
    const boardEl = document.getElementById(boardId);
    let html = "";
    const now = new Date();
    let serverTime = now;

    // 1. 先收集這個看板需要請求哪些不同的唯一 Stop ID
    const uniqueIds = [...new Set(routeList.map(item => item.id))];

    // 2. 併發請求九巴 API 獲取最新的實時大數據
    await Promise.all(uniqueIds.map(async (id) => {
        try {
            const response = await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/stop-eta/${id}`);
            if (response.ok) {
                const result = await response.json();
                if (result && Array.isArray(result.data)) {
                    stopCache[id] = result.data;
                    if (result.generated_timestamp) serverTime = new Date(result.generated_timestamp);
                }
            }
        } catch (e) {
            console.error(`讀取站點 ${id} 失敗:`, e);
        }
    }));

    // 3. 逐條路線依據正確的細分 ID 從快取裡撈出時間並渲染
    routeList.forEach(info => {
        const rawData = stopCache[info.id] || [];
        // 過濾出符合該路線且有實時時間的班次
        let routeData = rawData.filter(item => item.route === info.route && item.eta);

        let etaText1 = "暫無班次";
        let etaText2 = "";
        let destName = "往 " + info.dest;

        if (routeData.length > 0) {
            routeData.sort((a, b) => new Date(a.eta) - new Date(b.eta));
            if (routeData[0].dest_tc) destName = `往 ${routeData[0].dest_tc}`;

            const diff1 = Math.max(0, Math.round((new Date(routeData[0].eta) - serverTime) / 1000 / 60));
            etaText1 = diff1 === 0 ? "即將抵達" : `${diff1} 分鐘`;

            if (routeData[1] && routeData[1].eta) {
                const diff2 = Math.max(0, Math.round((new Date(routeData[1].eta) - serverTime) / 1000 / 60));
                etaText2 = diff2 === 0 ? "下班: 即將抵達" : `下班: ${diff2} 分鐘`;
            }
        }

        const isStatic = etaText1 === "暫無班次";

        html += `
            <div class="eta-row">
                <div class="route-badge">${info.route}</div>
                <div class="route-dest">${destName}</div>
                <div class="eta-box">
                    <span class="eta-time ${isStatic ? 'no-bus' : ''}">${etaText1}</span>
                    ${etaText2 ? `<span class="eta-next">${etaText2}</span>` : ''}
                </div>
            </div>
        `;
    });

    boardEl.innerHTML = html;
}

function initUpdate() {
    stopCache = {}; // 每次刷新前清空舊快取
    processBoard("board-cheung-wo", STATIONS["board-cheung-wo"]);
    processBoard("board-kwun-tong", STATIONS["board-kwun-tong"]);
    
    const now = new Date();
    document.getElementById('last-update').innerText = `最後更新時間: ${now.toLocaleTimeString()}`;
}

initUpdate();
setInterval(initUpdate, 30000); // 每 30 秒全自動同步
</script>
</body>
</html>
